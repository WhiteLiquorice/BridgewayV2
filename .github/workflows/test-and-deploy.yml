name: Test & Deploy Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-tests:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            Booking/package-lock.json
            tests/package-lock.json

      - name: Install Booking app dependencies
        run: npm ci
        working-directory: ./Booking

      - name: Install test dependencies
        run: npm install
        working-directory: ./tests

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./tests

      - name: Start Booking app in background
        run: |
          npm run dev &
          sleep 5
        working-directory: ./Booking
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: ./tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 30

# Note: Vercel deployment is handled by Vercel's GitHub integration.
# To gate Vercel deployments on CI passing, configure "Ignored Build Step"
# in Vercel project settings to check commit status.
