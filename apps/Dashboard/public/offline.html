<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Bridgeway Dashboard</title>
  <style>
    body { margin: 0; background: #0c1a2e; color: #fff; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { text-align: center; padding: 2rem; max-width: 360px; }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { color: #6b7280; font-size: 0.875rem; }
    button { margin-top: 1.5rem; background: #f59e0b; color: #0c1a2e; font-weight: 600; border: none; border-radius: 0.5rem; padding: 0.625rem 1.5rem; cursor: pointer; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're offline</h1>
    <p>Bridgeway Dashboard requires an internet connection. Please check your network and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
