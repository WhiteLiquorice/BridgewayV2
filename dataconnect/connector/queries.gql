# Get current user profile and their org
query GetUserProfile @auth(level: USER) {
  profiles(where: { userId: { eq_expr: "auth.uid" } }) {
    id
    userId
    role
    fullName
    email
    phone
    isActive
    org {
      id
      name
      slug
      status
      subscriptionTier
      onboardingComplete
    }
  }
}

# Get Organization Settings
query GetOrgSettings($orgId: UUID!) @auth(level: USER) {
  orgSettings(where: { orgId: { eq: $orgId } }) {
    paymentRequired
    stripeCustomerId
    stripeSubscriptionId
    paymentPastDue
    externalCalendarId
    externalCalendarType
    externalCalendarSyncEnabled
    disabledWidgets
    bookingConfig
  }
}

# Get all profiles for an organization
query GetOrgProfiles($orgId: UUID!) @auth(level: USER) {
  profiles(where: { orgId: { eq: $orgId } }, orderBy: [{ fullName: ASC }]) {
    id
    userId
    role
    fullName
    email
    phone
    isActive
    commissionRatePercentage
  }
}

# Update a profile's active status
mutation UpdateProfileStatus($id: UUID!, $isActive: Boolean!) @auth(level: USER) {
  profile_update(key: { id: $id }, data: { isActive: $isActive })
}

# Create a new profile (usually for invites)
mutation CreateOrgProfile($orgId: UUID!, $fullName: String!, $email: String!, $role: String!, $commissionRatePercentage: Int!) @auth(level: USER) {
  profile_insert(data: {
    orgId: $orgId,
    fullName: $fullName,
    email: $email,
    role: $role,
    commissionRatePercentage: $commissionRatePercentage,
    isActive: true
  })
}

# Update organization branding and core info
mutation UpdateOrgBranding(
  $id: UUID!,
  $name: String!,
  $address: String,
  $phone: String,
  $website: String,
  $primaryColor: String,
  $secondaryColor: String,
  $logoUrl: String,
  $layoutTheme: String,
  $appTheme: String,
  $sessionTimeoutAdminMin: Int,
  $sessionTimeoutManagerMin: Int,
  $sessionTimeoutStaffMin: Int
) @auth(level: USER) {
  org_update(key: { id: $id }, data: {
    name: $name,
    address: $address,
    phone: $phone,
    website: $website,
    primaryColor: $primaryColor,
    secondaryColor: $secondaryColor,
    logoUrl: $logoUrl,
    layoutTheme: $layoutTheme,
    appTheme: $appTheme,
    sessionTimeoutAdminMin: $sessionTimeoutAdminMin,
    sessionTimeoutManagerMin: $sessionTimeoutManagerMin,
    sessionTimeoutStaffMin: $sessionTimeoutStaffMin
  })
}

# Update organization settings (widgets and booking config)
mutation UpdateOrgSettings($orgId: UUID!, $disabledWidgets: Any, $bookingConfig: Any) @auth(level: USER) {
  orgSetting_upsert(data: {
    orgId: $orgId,
    disabledWidgets: $disabledWidgets,
    bookingConfig: $bookingConfig
  })
}

# Create a new organization
mutation CreateOrg($name: String!, $subscriptionTier: String!, $stripePublishableKey: String, $email: String!) @auth(level: NO_ACCESS) {
  org_insert(data: {
    name: $name,
    subscriptionTier: $subscriptionTier,
    stripePublishableKey: $stripePublishableKey,
    status: "active",
    onboardingComplete: false
  })
}

# Create a profile using explicit IDs
mutation ProvisionProfile($userId: String!, $orgId: UUID!, $fullName: String!, $email: String!, $role: String!) @auth(level: NO_ACCESS) {
  profile_insert(data: {
    userId: $userId,
    orgId: $orgId,
    fullName: $fullName,
    email: $email,
    role: $role,
    isActive: true,
    commissionRatePercentage: 0
  })
}

# Upsert Org Setting
mutation ProvisionOrgSetting($orgId: UUID!, $stripeCustomerId: String!, $stripeSubscriptionId: String!) @auth(level: NO_ACCESS) {
  orgSetting_upsert(data: {
    orgId: $orgId,
    paymentRequired: true,
    stripeCustomerId: $stripeCustomerId,
    stripeSubscriptionId: $stripeSubscriptionId
  })
}
